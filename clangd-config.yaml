# This file is used to configure the clangd index server.
# location: ~/.config/clangd/config.yaml
#      mac: ~/Library/Preferences/clangd/config.yaml
# ref: https://github.com/clangd/chrome-remote-index/blob/main/docs/index.md
# ref: https://github.com/chromium/chromium/blob/main/docs/clangd.md#getting-clangd
# NOTE: ~ should be replaced with an absolute path.
# NOTE: don't forget to call 
#   ./tools/clang/scripts/generate_compdb.py -o compile_commands.json -p ./out/Default/

CompileFlags:
  # Strip C++20 modules flags. Chromium builds .pcm files with its bundled
  # clang, and loading them in any other clangd (or even the bundled one,
  # due to a 23.0.0git regression in indexHeaderSymbols) crashes the server.
  # clangd parses headers textually instead — slower preamble, but stable.
  Remove:
    - -fmodules
    - -fbuiltin-module-map
    - -fno-implicit-module-maps
    - -fno-implicit-modules
    - -fmodule-map-file=*
    - -fmodule-file=*
    - -fmodules-cache-path=*
    - -fmodules-disable-diagnostic-validation
    - -fmodules-local-submodule-visibility
    - -fmodule-file-home-is-cwd
    - -Wno-modules-ambiguous-internal-linkage
    - -Wno-modules-import-nested-redundant
    - -Wno-module-import-in-extern-c

If:
  PathMatch: /home/cg/google/chromium/src/.*
Index:
  External:
    Server: linux.clangd-index.chromium.org:5900
    MountPoint: /home/cg/google/chromium/src/

---

